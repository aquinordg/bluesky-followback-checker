name: Build and Release Bluesky Followback Checker

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build executable
      run: |
        pyinstaller --onefile --console --name "bluesky_followback" --hidden-import=atproto bluesky_followback.py
    
    - name: Upload Windows executable
      uses: actions/upload-artifact@v4
      with:
        name: bluesky-followback-windows
        path: dist/bluesky_followback.exe
    
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v2
      with:
        files: dist/bluesky_followback.exe
        draft: false
        prerelease: false
        body_path: RELEASE_NOTES.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build executable
      run: |
        pyinstaller --onefile --console --name "bluesky_followback" --hidden-import=atproto bluesky_followback.py
    
    - name: Upload Linux binary
      uses: actions/upload-artifact@v4
      with:
        name: bluesky-followback-linux
        path: dist/bluesky_followback

  build-macos:
    runs-on: macos-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt
    
    - name: Build executable
      run: |
        pyinstaller --onefile --console --name "bluesky_followback" --hidden-import=atproto bluesky_followback.py
    
    - name: Upload macOS binary
      uses: actions/upload-artifact@v4
      with:
        name: bluesky-followback-macos
        path: dist/bluesky_followback
